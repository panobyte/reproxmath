            display: none; min-height: 100vh; background: #020617; color: white; font-family: 'Inter', sans-serif;
        }

        .sidebar {
            height: 100vh; width: 250px; position: fixed; left: -250px; top: 0;
            background: #0f172a; transition: 0.3s; z-index: 1000; border-right: 1px solid #1e293b;
            padding-top: 60px;
        }
        .sidebar.active { left: 0; }
        .sidebar a {
            padding: 15px 25px; text-decoration: none; color: #94a3b8; display: block; cursor: pointer;
        }
        .sidebar a:hover { background: #1e293b; color: #38bdf8; }

        .dash-nav {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            padding: 0.8rem 2rem; display: flex; align-items: center;
            position: sticky; top: 0; border-bottom: 1px solid #1e293b; z-index: 999;
        }
        .menu-icon { font-size: 24px; cursor: pointer; margin-right: 20px; color: #38bdf8; }

        .content-view { display: none; height: calc(100vh - 70px); }
        .content-view.active { display: flex; flex-direction: column; }

        .proxy-bar {
            background: #1e293b; padding: 10px 20px; display: flex; gap: 10px; border-bottom: 1px solid #334155;
        }
        .url-input {
            flex-grow: 1; background: #0f172a; border: 1px solid #334155; 
            color: #38bdf8; padding: 8px 15px; border-radius: 6px; outline: none;
        }
        .go-btn { background: #38bdf8; color: #0f172a; border: none; padding: 0 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        #proxy-frame-container { flex-grow: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .settings-card { background: #0f172a; border: 1px solid #1e293b; padding: 30px; border-radius: 12px; max-width: 500px; margin: 40px auto; }
    </style>
</head>
<body>

        </header> 
        <div class="portal">
            <div class="backdrop svelte-1gib9mj">

                    <h4 class="panel-heading modal-title svelte-1u32zkt">Member Login</h4> 
                    <form id="authForm" style="padding: 20px;">
                        <div class="form-row svelte-1gdqdka">
                            <label class="slabel svelte-1gdqdka">Username (Press Enter)</label>
                            <input type="text" id="userInput" class="form-input svelte-1gdqdka" placeholder="A1B2C3" required>
                        </div> 
                        <div id="pass-row" class="form-row svelte-1gdqdka">
                            <label class="slabel svelte-1gdqdka">Password</label>
                            <input type="password" id="passInput" class="form-input svelte-1gdqdka" placeholder="A2B3C4">
                        </div> 
                        <div class="tools svelte-1u32zkt" style="text-align: right; margin-top: 15px;">
                            <button type="submit" class="sbtn primary svelte-d623es">Sign In</button>
                        </div> 
                        <div class="social-logins svelte-1u32zkt">
                            <hr><div class="social-icons svelte-1u32zkt">

                                <div class="social-button svelte-1u32zkt"><div class="icon svelte-1u32zkt"><svg width="18" height="18" viewBox="0 0 2499.6 2500"><path d="m1187.9 1187.9h-1187.9v-1187.9h1187.9z" fill="#f1511b"/><path d="m2499.6 1187.9h-1188v-1187.9h1187.9v1187.9z" fill="#80cc28"/><path d="m1187.9 2500h-1187.9v-1187.9h1187.9z" fill="#00adef"/><path d="m2499.6 2500h-1188v-1187.9h1187.9v1187.9z" fill="#fbbc09"/></svg></div><div class="label">Microsoft</div></div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-view">
        <div id="sidebar" class="sidebar">
            <a onclick="showView('proxy-view')">Proxy</a>
            <a onclick="location.reload()" style="color:#ef4444; margin-top: 50px;">🚪 Logout</a>
        </div>

        <nav class="dash-nav">
            <div class="menu-icon" onclick="toggleSidebar()">☰</div>
            <h2 id="view-title" style="margin:0; font-size: 1.2rem; font-weight:800; color:#38bdf8;">PROXY_BROWSER</h2>
        </nav>

        <div id="proxy-view" class="content-view active">
            <div class="proxy-bar">
                <input type="text" id="urlInput" class="url-input" placeholder="Enter URL (e.g. gn-math.dev)">
                <button class="go-btn" onclick="launchProxy()">Launch</button>
            </div>
            <div id="proxy-frame-container">
                <iframe id="main-frame" src="about:blank"></iframe>
            </div>
        </div>

    <script>
        const uInp = document.getElementById('userInput');
        const pRow = document.getElementById('pass-row');
        const authForm = document.getElementById('authForm');
    
        uInp.addEventListener('keydown', (e) => {
            if (e.key === "Enter") {
                e.preventDefault(); 
                if (uInp.value.trim() !== "") {
                    pRow.style.display = 'block';
                    document.getElementById('passInput').focus();
                }
            }
        });
    
        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (uInp.value === "A1B2C3" && document.getElementById('passInput').value === "A2B3C4") {
                document.getElementById('login-wrapper').style.display = 'none';
                document.getElementById('dashboard-view').style.display = 'block';
            }
        });
    
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    
        function launchProxy() {
            const urlInput = document.getElementById('urlInput');
            let target = urlInput.value.trim();
            const workerURL = "https://spring-moon-2ca5.panobyte.workers.dev";
            
            if (!target) return;
    
            if (!target.startsWith('http')) {
                target = 'https://' + target;
            }
            
            document.getElementById('main-frame').src = `${workerURL}/?url=${encodeURIComponent(target)}`;
        }
    
        document.getElementById('urlInput').addEventListener('keydown', (e) => {
            if (e.key === "Enter") launchProxy();
        });
    </script>
</body>
</html>
